<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple color piker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <h2>Color Piker</h2>
        <input type="color" id="colorPiker" class="colorPiker" oninput="color()">
        <input type="text" id="ColorText" class="ColorText" placeholder="Choose color to show HEX code" disabled>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
